name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax-checks:
    name: Syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: bash -n on .sh files
        run: |
          set -e
          while IFS= read -r -d '' f; do bash -n "$f"; done < <(find . -name "*.sh" -not -path "./node_modules/*" -print0)

      - name: jq syntax on .json files
        run: |
          set -e
          while IFS= read -r -d '' f; do jq -e . "$f" > /dev/null; done < <(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" -print0)

      - name: Python syntax check
        run: |
          set -e
          while IFS= read -r -d '' f; do python3 -m py_compile "$f"; done < <(find . -name "*.py" -not -path "./node_modules/*" -print0)

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: syntax-checks
    steps:
      - uses: actions/checkout@v6
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run tests/run-all.sh if present
        run: |
          if [ -x tests/run-all.sh ]; then
            bash tests/run-all.sh
          else
            echo "No tests/run-all.sh — skipping."
          fi
